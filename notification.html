<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Chrome Notification</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#111;
        font-family:Arial;
    }

    button{
        padding:18px 40px;
        font-size:22px;
        border:none;
        border-radius:15px;
        cursor:pointer;
        background:#00bfff;
        color:white;
        transition:0.3s;
        box-shadow:0 0 20px #00bfff;
    }

    button:hover{
        transform:scale(1.08);
        box-shadow:0 0 35px #00bfff;
    }
</style>
</head>
<body>

<button onclick="sendNotification()">
    دوس هنا
</button>

<script>
async function sendNotification() {

    if (!("Notification" in window)) {
        alert("المتصفح مش بيدعم الاشعارات");
        return;
    }

    let permission = await Notification.requestPermission();

    if (permission === "granted") {

        new Notification("🔥 إشعار من موقعك", {
            body: "الزرار اشتغل بنجاح 😎",
            icon: "https://cdn-icons-png.flaticon.com/512/1827/1827392.png"
        });

    } else {
        alert("لازم تسمح بالاشعارات");
    }
}
</script>

</body>
</html>
